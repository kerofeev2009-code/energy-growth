                    </div>
                  </div>
                  <p className={`text-xs md:text-sm lg:text-base font-medium leading-relaxed mb-4 md:mb-6 lg:mb-8 xl:mb-10 ${isAccessible ? 'text-white' : 'text-slate-600'}`}>{selectedVideo.description}</p>
                  <div className="grid grid-cols-2 gap-2 md:gap-3 lg:gap-4 mb-4 md:mb-6 lg:mb-8 xl:mb-10">
                    <div className={`p-2 md:p-3 lg:p-4 xl:p-6 rounded-lg md:rounded-xl lg:rounded-2xl border text-center shadow-sm ${isAccessible ? 'border-white' : 'bg-slate-50 border-slate-100'}`}>
                      <span className="block text-[8px] md:text-[9px] lg:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 md:mb-2">{t.duration}</span>
                      <span className={`text-xs md:text-sm lg:text-base xl:text-lg font-black ${isAccessible ? 'text-white' : 'text-slate-900'}`}>{selectedVideo.durationMinutes}{lang === 'ru' ? 'м' : 'm'}</span>
                    </div>
                    <div className={`p-2 md:p-3 lg:p-4 xl:p-6 rounded-lg md:rounded-xl lg:rounded-2xl border text-center shadow-sm ${isAccessible ? 'border-white' : 'bg-slate-50 border-slate-100'}`}>
                      <span className="block text-[8px] md:text-[9px] lg:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 md:mb-2">{t.views}</span>
                      <span className={`text-xs md:text-sm lg:text-base xl:text-lg font-black ${isAccessible ? 'text-white' : 'text-slate-900'}`}>{Math.floor(selectedVideo.views / 1000)}k</span>
                    </div>
                  </div>
                  <div className="mt-auto space-y-1 md:space-y-2 lg:space-y-3">
                    <button className={`w-full py-2 md:py-3 lg:py-4 xl:py-5 rounded-lg md:rounded-xl lg:rounded-2xl font-black text-[10px] md:text-xs lg:text-sm uppercase tracking-widest shadow-xl transition-all ${isAccessible ? 'bg-white text-black' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{t.lesson_materials}</button>
                    <button onClick={() => setSelectedVideo(null)} className={`w-full py-1.5 md:py-2 lg:py-2.5 xl:py-3 font-black text-[8px] md:text-[9px] lg:text-[10px] xl:text-xs uppercase tracking-widest transition-colors ${isAccessible ? 'text-white underline' : 'text-slate-400 hover:text-slate-600'}`}>{t.close_player}</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
    
    const FinCoursePage = ({ lang, isAccessible, onNavigate }) => {
      const [selectedTopic, setSelectedTopic] = useState(null);
      const [selectedLevelColor, setSelectedLevelColor] = useState('emerald');
      const [completedTopics, setCompletedTopics] = useState([]);
      const [topicScores, setTopicScores] = useState({});
      const [badges, setBadges] = useState([]);
      
      useEffect(() => {
        const saved = localStorage.getItem('finLiteracyProgress');
        if (saved) {
          const data = JSON.parse(saved);
          setCompletedTopics(data.completedTopics || []);
          setTopicScores(data.topicScores || {});
          setBadges(data.badges || []);
        }
      }, []);
      
      useEffect(() => {
        localStorage.setItem('finLiteracyProgress', JSON.stringify({ completedTopics, topicScores, badges }));
      }, [completedTopics, topicScores, badges]);
      
      useEffect(() => {
        const newBadges = [];
        const completedCount = completedTopics.length;
        FIN_BADGES.forEach(badge => {
          let earned = false;
          if (badge.req === 1 && completedCount >= 1) earned = true;
          if (badge.req === 8 && completedCount >= 8) earned = true;
          if (badge.req === 16 && completedCount >= 16) earned = true;
          if (badge.req === 24 && completedCount >= 24) earned = true;
          if (badge.req === 5 && completedCount >= 5) earned = true;
          if (earned && !badges.find(b => b.id === badge.id)) {
            newBadges.push({ id: badge.id, earned: true, earnedAt: new Date().toISOString() });
          }
        });
        if (newBadges.length > 0) setBadges(prev => [...prev, ...newBadges]);
      }, [completedTopics]);
      
      const handleTopicComplete = (topicId, score) => {
        if (!completedTopics.includes(topicId)) setCompletedTopics([...completedTopics, topicId]);
        setTopicScores({ ...topicScores, [topicId]: score });
      };
      
      const resetProgress = () => {
        if (confirm('Сбросить весь прогресс?')) {
          setCompletedTopics([]);
          setTopicScores({});
          setBadges([]);
          localStorage.removeItem('finLiteracyProgress');
        }
      };
      
      const totalTopics = 24;
      const completedCount = completedTopics.length;
      const overallProgress = Math.round((completedCount / totalTopics) * 100);
      
      return (
        <div className={`min-h-screen pb-20 md:pb-24 pt-20 md:pt-24 px-4 md:px-6 ${isAccessible ? 'bg-black text-white' : 'bg-[#F8FAFC] text-slate-900'}`}>
          <div className={`sticky top-16 md:top-20 z-40 mb-4 md:mb-6 ${isAccessible ? 'bg-black' : 'bg-[#F8FAFC]'}`}>
            <div className={`flex items-center justify-between p-2 md:p-3 lg:p-4 rounded-lg md:rounded-xl lg:rounded-2xl ${isAccessible ? 'bg-white border-2 border-white' : 'bg-white border border-slate-200 shadow-lg'}`}>
              <div className="flex items-center gap-1 md:gap-2">
                <button onClick={() => onNavigate('home')} className={`px-2 md:px-3 lg:px-4 py-1 md:py-1.5 lg:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs lg:text-sm font-black uppercase tracking-widest transition-all flex items-center gap-1 md:gap-2 ${isAccessible ? 'bg-black text-white hover:bg-slate-800' : 'bg-slate-100 text-slate-700 hover:bg-indigo-50'}`}>
                  🏠 {lang === 'ru' ? 'На главную' : 'Home'}
                </button>
                <button onClick={() => onNavigate('courses')} className={`px-2 md:px-3 lg:px-4 py-1 md:py-1.5 lg:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs lg:text-sm font-black uppercase tracking-widest transition-all flex items-center gap-1 md:gap-2 ${isAccessible ? 'bg-black text-white hover:bg-slate-800' : 'bg-slate-100 text-slate-700 hover:bg-indigo-50'}`}>
                  📚 {lang === 'ru' ? 'К курсам' : 'Courses'}
                </button>
              </div>
              <div className={`text-[10px] md:text-xs lg:text-sm font-black uppercase tracking-widest ${isAccessible ? 'text-white' : 'text-slate-500'}`}>
                💰 ФинГрамотность
              </div>
            </div>
          </div>
          
          <div className="max-w-7xl mx-auto space-y-6 md:space-y-8 lg:space-y-12 animate-fadeIn">
            <section className={`rounded-xl md:rounded-2xl lg:rounded-[3rem] p-5 md:p-6 lg:p-8 xl:p-12 border ${isAccessible ? 'bg-black border-white' : 'bg-gradient-to-br from-emerald-600 to-indigo-600 text-white border-none shadow-2xl'}`}>
              <div className="flex flex-col md:flex-row items-center justify-between gap-4 md:gap-6 lg:gap-8">
                <div className="space-y-2 md:space-y-3 lg:space-y-4 xl:space-y-6">
                  <h1 className="text-xl md:text-3xl lg:text-4xl xl:text-5xl font-black uppercase tracking-tighter">💰 Финансовая<br /><span className={isAccessible ? 'text-white' : 'text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-indigo-300'}>Грамотность</span></h1>
                  <p className={`text-xs md:text-sm lg:text-base xl:text-xl font-medium max-w-xl ${isAccessible ? 'text-white' : 'text-emerald-100'}`}>Полный курс из 24 тем в трёх уровнях. Короткие уроки (5-10 мин), тесты, бейджи и отслеживание прогресса.</p>
                  <div className="flex flex-wrap gap-2 md:gap-3 lg:gap-4">
                    <div className={`px-2 md:px-3 lg:px-4 xl:px-6 py-1.5 md:py-2 lg:py-2.5 xl:py-3 rounded-lg md:rounded-xl lg:rounded-2xl ${isAccessible ? 'bg-white text-black' : 'bg-white/20 backdrop-blur-md'}`}><span className="block text-[8px] md:text-[9px] lg:text-[10px] xl:text-xs font-black uppercase tracking-widest opacity-60">Прогресс</span><span className="text-sm md:text-base lg:text-lg xl:text-2xl font-black">{overallProgress}%</span></div>
                    <div className={`px-2 md:px-3 lg:px-4 xl:px-6 py-1.5 md:py-2 lg:py-2.5 xl:py-3 rounded-lg md:rounded-xl lg:rounded-2xl ${isAccessible ? 'bg-white text-black' : 'bg-white/20 backdrop-blur-md'}`}><span className="block text-[8px] md:text-[9px] lg:text-[10px] xl:text-xs font-black uppercase tracking-widest opacity-60">Темы</span><span className="text-sm md:text-base lg:text-lg xl:text-2xl font-black">{completedCount}/{totalTopics}</span></div>
                    <div className={`px-2 md:px-3 lg:px-4 xl:px-6 py-1.5 md:py-2 lg:py-2.5 xl:py-3 rounded-lg md:rounded-xl lg:rounded-2xl ${isAccessible ? 'bg-white text-black' : 'bg-white/20 backdrop-blur-md'}`}><span className="block text-[8px] md:text-[9px] lg:text-[10px] xl:text-xs font-black uppercase tracking-widest opacity-60">Бейджи</span><span className="text-sm md:text-base lg:text-lg xl:text-2xl font-black">{badges.length}/{FIN_BADGES.length}</span></div>
                  </div>
                </div>
                <div className="text-5xl md:text-6xl lg:text-7xl xl:text-9xl animate-pulse-slow">🎓</div>
              </div>
            </section>
            <div className="flex justify-end">
              <button onClick={resetProgress} className={`px-2 md:px-3 lg:px-4 py-1 md:py-1.5 lg:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs lg:text-sm font-black uppercase tracking-widest border transition-all ${isAccessible ? 'border-white text-white' : 'border-rose-300 text-rose-600 hover:bg-rose-50'}`}>🔄 Сбросить прогресс</button>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 lg:gap-8">
              <FinStatsPanel completedTopics={completedTopics} topicScores={topicScores} badges={badges} isAccessible={isAccessible} />
              <FinBadgesPanel badges={badges} isAccessible={isAccessible} />
            </div>
            <FinLevelSection level={FIN_COURSE_DATA.beginner} completedTopics={completedTopics} topicScores={topicScores} onTopicClick={(topic, color) => { setSelectedTopic(topic); setSelectedLevelColor(color); }} isAccessible={isAccessible} />
            <FinLevelSection level={FIN_COURSE_DATA.intermediate} completedTopics={completedTopics} topicScores={topicScores} onTopicClick={(topic, color) => { setSelectedTopic(topic); setSelectedLevelColor(color); }} isAccessible={isAccessible} />
            <FinLevelSection level={FIN_COURSE_DATA.advanced} completedTopics={completedTopics} topicScores={topicScores} onTopicClick={(topic, color) => { setSelectedTopic(topic); setSelectedLevelColor(color); }} isAccessible={isAccessible} />
          </div>
          {selectedTopic && <FinTopicViewer topic={selectedTopic} onClose={() => setSelectedTopic(null)} onComplete={handleTopicComplete} isAccessible={isAccessible} levelColor={selectedLevelColor} onNavigate={onNavigate} />}
        </div>
      );
    };
    
    const ProfilePage = ({ lang, isAccessible, startedCourses, onLogout }) => {
      const t = translations[lang];
      return (
        <div className="pt-20 md:pt-24 lg:pt-32 pb-16 md:pb-20 lg:pb-24 max-w-7xl mx-auto px-4 md:px-6 space-y-8 md:space-y-12 lg:space-y-16 animate-fadeIn">
          <section className={`rounded-xl md:rounded-2xl lg:rounded-[3rem] p-5 md:p-6 lg:p-8 xl:p-20 border ${isAccessible ? 'bg-black border-white' : 'bg-white border-slate-200 shadow-xl'}`}>
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 md:gap-6 lg:gap-8">
              <div>
                <h1 className="text-xl md:text-2xl lg:text-4xl xl:text-5xl font-black uppercase tracking-tighter mb-2 md:mb-3 lg:mb-4">{t.profile_welcome} User</h1>
                <p className="text-sm md:text-base lg:text-xl opacity-60 font-medium">{t.profile_progress}</p>
              </div>
              <button onClick={onLogout} className={`px-4 md:px-5 lg:px-6 xl:px-8 py-2 md:py-2.5 lg:py-3 xl:py-4 rounded-lg md:rounded-xl lg:rounded-2xl font-black text-xs md:text-sm uppercase tracking-widest border transition-all ${isAccessible ? 'border-white text-white' : 'border-rose-100 text-rose-600 bg-rose-50 hover:bg-rose-100'}`}>{t.logout}</button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 lg:gap-8 mt-8 md:mt-10 lg:mt-12 xl:mt-16">
              <div className={`p-4 md:p-5 lg:p-6 xl:p-8 rounded-xl md:rounded-2xl lg:rounded-[2rem] border ${isAccessible ? 'border-white' : 'bg-slate-50 border-slate-100'}`}><div className="text-[9px] md:text-[10px] lg:text-xs font-black uppercase tracking-widest opacity-50 mb-1 md:mb-2">{t.profile_stats_courses}</div><div className="text-xl md:text-2xl lg:text-3xl xl:text-4xl font-black">{startedCourses.length}</div></div>
              <div className={`p-4 md:p-5 lg:p-6 xl:p-8 rounded-xl md:rounded-2xl lg:rounded-[2rem] border ${isAccessible ? 'border-white' : 'bg-slate-50 border-slate-100'}`}><div className="text-[9px] md:text-[10px] lg:text-xs font-black uppercase tracking-widest opacity-50 mb-1 md:mb-2">{t.profile_stats_hours}</div><div className="text-xl md:text-2xl lg:text-3xl xl:text-4xl font-black">0.0</div></div>
              <div className={`p-4 md:p-5 lg:p-6 xl:p-8 rounded-xl md:rounded-2xl lg:rounded-[2rem] border ${isAccessible ? 'border-white' : 'bg-slate-50 border-slate-100'}`}><div className="text-[9px] md:text-[10px] lg:text-xs font-black uppercase tracking-widest opacity-50 mb-1 md:mb-2">{t.certificates}</div><div className="text-xl md:text-2xl lg:text-3xl xl:text-4xl font-black">0</div></div>
            </div>
          </section>
          <section className="space-y-4 md:space-y-6 lg:space-y-8 xl:space-y-12">
            <h2 className="text-base md:text-lg lg:text-xl xl:text-3xl font-black uppercase tracking-tight border-l-4 border-indigo-600 pl-3 md:pl-4 lg:pl-5 xl:pl-6">{t.profile_started_courses}</h2>
            {startedCourses.length > 0 ? (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 lg:gap-10">
                {startedCourses.map(course => (<CourseCard key={course.id} course={course} onEnroll={() => {}} lang={lang} isAccessible={isAccessible} />))}
              </div>
            ) : (
              <div className={`p-8 md:p-12 lg:p-16 xl:p-20 rounded-xl md:rounded-2xl lg:rounded-[3rem] text-center border-4 border-dashed ${isAccessible ? 'border-white' : 'border-slate-100 text-slate-300'}`}><p className="text-sm md:text-base lg:text-xl font-black uppercase tracking-widest opacity-50 italic">{t.profile_no_courses}</p></div>
            )}
          </section>
        </div>
      );
    };

    // ==================== MAIN APP ====================
    const App = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [lang, setLang] = useState('ru');
      const [isAccessible, setIsAccessible] = useState(false);
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [showAuth, setShowAuth] = useState(false);
      const [authType, setAuthType] = useState('login');
      const [startedCourses, setStartedCourses] = useState([]);
      
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [currentPage]);
      
      const toggleLang = () => setLang(prev => (prev === 'ru' ? 'en' : 'ru'));
      const toggleAccessible = () => setIsAccessible(prev => !prev);
      
      const handleStartCourse = course => {
        if (!startedCourses.find(c => c.id === course.id)) {
          setStartedCourses([...startedCourses, course]);
        }
      };
      
      const renderPage = () => {
        switch (currentPage) {
          case 'courses': return <CoursesPage onNavigate={setCurrentPage} lang={lang} isAccessible={isAccessible} onStartCourse={handleStartCourse} />;
          case 'videos': return <VideosPage onNavigate={setCurrentPage} lang={lang} isAccessible={isAccessible} />;
          case 'fin': return <FinCoursePage lang={lang} isAccessible={isAccessible} onNavigate={setCurrentPage} />;
          case 'profile': return <ProfilePage lang={lang} isAccessible={isAccessible} startedCourses={startedCourses} onLogout={() => { setIsLoggedIn(false); setCurrentPage('home'); }} />;
          default: return <HomePage onNavigate={setCurrentPage} lang={lang} isAccessible={isAccessible} />;
        }
      };
      
      return (
        <div className={`min-h-screen flex flex-col font-inter selection:bg-indigo-600 selection:text-white transition-colors duration-500 ${isAccessible ? 'accessibility-mode bg-black text-white' : 'bg-[#F8FAFC] text-slate-900'}`}>
          <Navbar currentPage={currentPage} onNavigate={setCurrentPage} lang={lang} toggleLang={toggleLang} isAccessible={isAccessible} toggleAccessible={toggleAccessible} isLoggedIn={isLoggedIn} onAuth={() => { setAuthType('login'); setShowAuth(true); }} />
          {renderPage()}
          <Footer onNavigate={setCurrentPage} lang={lang} isAccessible={isAccessible} />
          {showAuth && <AuthModal type={authType} lang={lang} onClose={() => setShowAuth(false)} onSuccess={() => { setIsLoggedIn(true); setShowAuth(false); }} isAccessible={isAccessible} />}
          <MobileNav currentPage={currentPage} onNavigate={setCurrentPage} lang={lang} isAccessible={isAccessible} />
        </div>
      );
    };
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<React.StrictMode><App /></React.StrictMode>);
  </script>
</body>
</html>
